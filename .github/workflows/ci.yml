name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secure-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: johnermac/noumenon

jobs:
  # -----------------------------
  # 1. Application correctness gate
  # -----------------------------
  test:
    name: Test application
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0.2
          bundler-cache: true

      - name: Run test suite
        env:
          RAILS_ENV: test
          REDIS_URL: redis://localhost:6379/0
          SCREENSHOT_ENABLED: false
        run: bundle exec rails test

  # -----------------------------
  # 2. Static analysis / security checks
  # -----------------------------
  security:
    name: Security checks
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      # -----------------------------
      # CodeQL (primary SAST)
      # -----------------------------
      - name: CodeQL Init
        uses: github/codeql-action/init@v4
        with:
          languages: ruby

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v4

      # -----------------------------
      # Semgrep (additional SAST)
      # -----------------------------
      - name: Semgrep Scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep semgrep scan \
            --config p/security-audit \
            --sarif \
            --output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # -----------------------------
  # 3. Build and scan Docker images
  # Only runs after tests and security checks pass.
  # -----------------------------
  images:
    name: Build Docker images
    needs:
      - test
      - security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      # -----------------------------
      # Build images
      # -----------------------------
      - name: Build runtime image
        run: |
          docker build \
            --target runtime \
            -t $IMAGE_NAME:latest \
            .

      - name: Build slimmed image
        run: |
          docker build \
            --target runtime-slimmed \
            -t $IMAGE_NAME:slimmed \
            .

      # -----------------------------
      # Scan final artifact (Grype)
      # -----------------------------
      - name: Scan slimmed image
        continue-on-error: true
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.IMAGE_NAME }}:slimmed
          cache-db: true
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload Grype SARIF
        if: always() && hashFiles('grype-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif
          category: grype-image

      # -----------------------------
      # Publish test image to Docker Hub
      # Safe rollout: only publish the slim image under a test tag,
      # and only on direct pushes to main after CI passes.
      # -----------------------------
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag slimmed image as test image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker tag $IMAGE_NAME:slimmed $IMAGE_NAME:slimmed_test

      - name: Push slimmed test image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push $IMAGE_NAME:slimmed_test
