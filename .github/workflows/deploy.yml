name: Secure Build Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_NAME: johnermac/noumenon

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # CodeQL (visibility)
      # -----------------------------
      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: ruby

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

      # -----------------------------
      # Semgrep (SAST)
      # -----------------------------
      - name: Semgrep Scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep semgrep scan \
            --config p/security-audit \
            --sarif \
            --output semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  build:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Build images
      # -----------------------------
      - name: Build runtime image
        run: |
          docker build \
            --target runtime \
            -t $IMAGE_NAME:latest \
            .

      - name: Build slimmed image
        run: |
          docker build \
            --target runtime-slimmed \
            -t $IMAGE_NAME:slimmed \
            .

      # -----------------------------
      # Scan final artifact
      # -----------------------------
      - name: Scan slimmed image
        id: grype_scan
        continue-on-error: true
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.IMAGE_NAME }}:slimmed
          severity-cutoff: high
          fail-build: true
          cache-db: true
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif
          category: grype-image

      - name: Fail build on Grype findings
        if: steps.grype_scan.outcome == 'failure'
        run: exit 1

      # -----------------------------
      # SBOM 
      # -----------------------------
      - name: Generate SBOM (slimmed)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:slimmed

      # -----------------------------
      # Login
      # -----------------------------
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------
      # Push (if gate passed)
      # -----------------------------
      - name: Push runtime image
        run: docker push $IMAGE_NAME:latest

      - name: Push slimmed image
        run: docker push $IMAGE_NAME:slimmed

      # -----------------------------
      # Cosign (keyless signing)
      # -----------------------------
      - uses: sigstore/cosign-installer@v3

      - name: Sign images
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes $IMAGE_NAME:latest
          cosign sign --yes $IMAGE_NAME:slimmed
