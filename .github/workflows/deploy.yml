name: Secure Build Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE_NAME: johnermac/noumenon

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # CodeQL
      - name: CodeQL Scan
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - run: go build ./...

      - uses: github/codeql-action/analyze@v3

      # Semgrep
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
          generateSarif: true

      # OSV
      - name: Install OSV-Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scan
        run: |
          ./osv-scanner -r . --format json --output osv-report.json

  build:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Build images (normal + slim)
      # -----------------------------
      - name: Build runtime image
        run: |
          docker build \
            --target runtime \
            -t $IMAGE_NAME:latest \
            .

      - name: Build slimmed image
        run: |
          docker build \
            --target runtime-slimmed \
            -t $IMAGE_NAME:slimmed \
            .

      # -----------------------------
      # Container scan 
      # -----------------------------
      - name: Scan runtime image
        uses: anchore/scan-action@v3
        with:
          image: $IMAGE_NAME:latest
          severity-cutoff: high
          fail-build: true

      - name: Scan slimmed image
        uses: anchore/scan-action@v3
        with:
          image: $IMAGE_NAME:slimmed
          severity-cutoff: high
          fail-build: true

      # -----------------------------
      # SBOM
      # -----------------------------
      - name: Generate SBOM (runtime)
        uses: anchore/sbom-action@v0
        with:
          image: $IMAGE_NAME:latest

      - name: Generate SBOM (slimmed)
        uses: anchore/sbom-action@v0
        with:
          image: $IMAGE_NAME:slimmed

      # -----------------------------
      # Login
      # -----------------------------
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------
      # Push (if scans passed)
      # -----------------------------
      - name: Push runtime image
        run: docker push $IMAGE_NAME:latest

      - name: Push slimmed image
        run: docker push $IMAGE_NAME:slimmed

      # -----------------------------
      # Cosign
      # -----------------------------
      - uses: sigstore/cosign-installer@v3

      - name: Sign images
        run: |
          cosign sign $IMAGE_NAME:latest
          cosign sign $IMAGE_NAME:slimmed